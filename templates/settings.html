<!DOCTYPE html>
<html>
<head><script src="https://cdn.tailwindcss.com"></script><style>body{background:#08080c;color:#fff;font-family:'Orbitron',sans-serif;}</style></head>
<body class="p-10">
    <div class="max-w-2xl mx-auto glass p-10 mt-10" style="background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem;">
        <h1 class="text-2xl font-black text-indigo-500 mb-8">SYSTEM SETTINGS</h1>
        <div class="space-y-6 mb-10">
            <p class="text-sm">User Identity: <span class="text-indigo-300">{{ session['user'] }}</span></p>
            <p class="text-sm">Assets Managed: {{ count }}</p>
            <p class="text-sm text-gray-500">Total Power Capacity: {{ power }}</p>
        </div>
        <form action="/reset_vault" method="POST" class="pt-6 border-t border-white/10">
            <p class="text-[10px] text-red-500 mb-4 font-bold">DANGER: WIPING VAULT CANNOT BE UNDONE</p>
            <button class="w-full bg-red-500/10 text-red-500 border border-red-500/30 py-4 rounded-2xl font-bold hover:bg-red-600 hover:text-white transition">ERASE ALL DATA</button>
        </form>
        <a href="/dashboard" class="block text-center mt-6 text-xs text-gray-500">Return to Dashboard</a>
    </div>

    <div class="volume" id="vol">

        <ul>
            <li>Suffix</li>
            <li>Volume Mode</li>
            <li></li>
        </ul>

        <button id="button">Exit</button>

        

    </div>
</body>
</html>
